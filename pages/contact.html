<!DOCTYPE html>
<html lang="en">

<!-- Basically the preamble -->
<head>
    <meta charset="UTF-8"> <!-- a void tag that specifies the character encoding for the HTML document -->
    <meta http-equiv="X-UA-Compatible" content="IE-edge"> <!-- a void tag that specifies the compatibility mode for Internet Explorer -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- a void tag that sets the viewport to make the website look good on all devices -->
    <meta keywords="adoption, mythical, pet, dragon, fantasy"> <!-- a void tag that provides metadata about the HTML document, such as keywords for search engines -->
    <meta name="author" content="Adam Sendzul"> <!-- a void tag that specifies the author of the HTML document -->
    <title>Adopt a Mythical Pet</title> <!-- the title of the HTML document, which is displayed in the browser's title bar or tab -->
    
    <!-- Google Fonts: -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css"> <!-- a void tag that links to an external CSS file for styling the HTML document -->

</head>

<!-- The body of the HTML document, which contains the content that will be displayed on the web page -->
<body>

    <!-- The header section of the web page, which contains the logo, navigation menu, and other important information -->
    <header>
        <div class="navbar">
            <div class="logo">
                <p>The Mythos Cradle</p>
            </div>

            <div class="navLinks">
                <a href="../index.html">Home</a>
                <a href="/pages/about.html">About</a>
                <a href="#">Contact us</a>
            </div>

            <div class="searchBar">
                <p>placeholder searchbar</p>
            </div>
        </div>

    </header>

    <section class="contactSection">
        <div class="contactContainer">

        </div>

        <!-- Form for contact us -->
        <div class="contactForm">
            <form>
                <div class="formElement">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="formElement">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="formElement">
                    <label for="students">Number of Students</label>
                    <input type="number" id="students" name="students" min="1" max="50">
                </div>
                <div class="formElement">
                    <label for="visit">Preferred Visit Date</label>
                    <input type="date" id="visit" name="visit">
                </div>
                <div class="formElement">
                    <label for="topic">Topic of Interest</label>
                    <select id="topic" name="topic">
                        <option value="">Select a value</option>
                        <option value="productivity">Study Productivity</option>
                    </select>
                </div>

                <div class="formElement">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="something about yapping to the company" required></textarea>
                </div>

                <button type="submit">Submit</button>
            </form>
        </div>
    </section>

    <footer>

    </footer>

</body>
</html>
